---
name: Manual E2E Test Trigger
'on':
  workflow_dispatch:
    inputs:
      mode:
        description: Target to run E2E tests on
        required: false
        default: pr
        type: choice
        options:
          - pr
          - main_latest
      pr_number:
        description: PR number to run E2E tests on (required for mode=pr)
        required: false
        type: string

permissions:
  contents: read
  pull-requests: read
  issues: write
  id-token: write

jobs:
  trigger_e2e:
    name: Manually Trigger E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 180
    env:
      CHECK_RUN_NAME: E2E Tests (GCP)
      GCS_BUCKET_NAME: slogcp-e2e-artifacts
      GCP_PROJECT_ID: slogcp
      GITHUB_TOKEN_SECRET_VERSION: projects/slogcp/secrets/GitHub-us-central1-connection-github-oauthtoken-34ff15/versions/latest
      RUN_REGION: us-central1

    steps:
      - name: Verify Authorization
        # actions/github-script v8 (pinned)
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd
        with:
          script: |
            const actor = context.actor;
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            let permission = 'none';
            try {
              const { data } = await github.rest.repos.getCollaboratorPermissionLevel({
                owner,
                repo,
                username: actor
              });
              permission = data.permission;
            } catch (error) {
              core.warning(`Unable to resolve collaborator permission for ${actor}: ${error.message}`);
              core.setFailed(`❌ Unauthorized: ${actor} does not have maintainer access.`);
              return;
            }

            const allowed = new Set(['admin', 'maintain', 'write']);
            if (!allowed.has(permission)) {
              core.setFailed(`❌ Unauthorized: ${actor} has '${permission}' permission and cannot trigger E2E tests.`);
              return;
            }

            core.info(`✅ Authorized maintainer: ${actor} (${permission})`);

      - name: Validate Inputs
        run: |
          if [[ "${{ github.event.inputs.mode }}" == "pr" && \
                -z "${{ github.event.inputs.pr_number }}" ]]; then
            echo "pr_number is required when mode=pr"
            exit 1
          fi

      - name: Get PR Information
        if: ${{ github.event.inputs.mode == 'pr' }}
        id: pr_info
        # actions/github-script v8 (pinned)
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd
        with:
          script: |
            const pr = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: ${{ github.event.inputs.pr_number }}
            });
            core.setOutput('head_sha', pr.data.head.sha);
            core.setOutput('head_ref', pr.data.head.ref);
            core.setOutput('author', pr.data.user.login);
            return pr.data;

      - name: Resolve latest main SHA
        if: ${{ github.event.inputs.mode == 'main_latest' }}
        id: main_sha
        # actions/github-script v8 (pinned)
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd
        with:
          script: |
            const { data: ref } = await github.rest.git.getRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: 'heads/main'
            });
            core.setOutput('sha', ref.object.sha);

      - name: Select Target SHA
        id: target
        run: |
          if [ "${{ github.event.inputs.mode }}" = "main_latest" ]; then
            head_sha="${{ steps.main_sha.outputs.sha }}"
            pr_number=''
          else
            head_sha="${{ steps.pr_info.outputs.head_sha }}"
            pr_number="${{ github.event.inputs.pr_number }}"
          fi

          printf 'head_sha=%s\n' "$head_sha" >>"$GITHUB_OUTPUT"
          printf 'pr_number=%s\n' "$pr_number" >>"$GITHUB_OUTPUT"

      - name: Generate E2E Run ID
        id: run_id
        shell: bash
        run: |
          run_id="$(date -u +%Y%m%dT%H%M%S)-$RANDOM"
          printf 'e2e_run_id=%s\n' "$run_id" >>"$GITHUB_OUTPUT"

      - name: Generate App Token for E2E
        id: app_token
        # actions/create-github-app-token v2 (pinned)
        uses: actions/create-github-app-token@f8d387b68d61c58ab83c6c016672934102569859 # v3
        with:
          app-id: ${{ secrets.E2E_APP_ID }}
          private-key: ${{ secrets.E2E_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: ${{ github.event.repository.name }}

      - name: Checkout Workflow Repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Create or Update Stable E2E Check
        id: create_check
        # actions/github-script v8 (pinned)
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd
        with:
          github-token: ${{ steps.app_token.outputs.token }}
          script: |
            const checkName = process.env.CHECK_RUN_NAME;
            const sha = '${{ steps.target.outputs.head_sha }}';
            const runId = '${{ steps.run_id.outputs.e2e_run_id }}';
            const existing = '${{ steps.target.outputs.pr_number }}'
              ? (await github.rest.checks.listForRef({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  ref: sha,
                  filter: 'latest',
                  per_page: 100
                })).data.check_runs
                  .filter(run => run.name === checkName)
                  .sort((a, b) => {
                    const aTime = Date.parse(a.started_at || a.completed_at || 0);
                    const bTime = Date.parse(b.started_at || b.completed_at || 0);
                    return bTime - aTime;
                  })[0]
              : null;

            const params = {
              owner: context.repo.owner,
              repo: context.repo.repo,
              name: checkName,
              status: 'in_progress',
              external_id: runId,
              started_at: new Date().toISOString(),
              output: {
                title: checkName,
                summary: `Manual Google Cloud Build E2E run ${runId} triggered by @${context.actor}.`
              }
            };

            if (existing) {
              await github.rest.checks.update({
                ...params,
                check_run_id: existing.id
              });
              core.setOutput('check_run_id', existing.id);
              return;
            }

            const { data: checkRun } = await github.rest.checks.create({
              ...params,
              head_sha: sha
            });
            core.setOutput('check_run_id', checkRun.id);
        env:
          CHECK_RUN_NAME: ${{ env.CHECK_RUN_NAME }}

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3
        with:
          workload_identity_provider: projects/110228674866/locations/global/workloadIdentityPools/slogcp-github-pool/providers/github-provider
          service_account: e2e-cloudbuild-invoker@slogcp.iam.gserviceaccount.com

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@aa5489c8933f4cc7a4f7d45035b3b1440c9c10db # v3

      - name: Run E2E Cloud Build
        id: cloud_build
        shell: bash
        run: |
          bash .github/scripts/run_e2e_cloud_build.sh
        env:
          LIB_REPO_FULL_NAME: ${{ github.repository }}
          PR_SHA: ${{ steps.target.outputs.head_sha }}
          PR_NUMBER: ${{ steps.target.outputs.pr_number }}
          CHECK_RUN_ID: ${{ steps.create_check.outputs.check_run_id }}
          LIB_RUN_ID: ${{ github.run_id }}
          E2E_RUN_ID: ${{ steps.run_id.outputs.e2e_run_id }}
          GCP_PROJECT_ID: ${{ env.GCP_PROJECT_ID }}
          GITHUB_TOKEN_SECRET_VERSION: ${{ env.GITHUB_TOKEN_SECRET_VERSION }}
          RUN_REGION: ${{ env.RUN_REGION }}
          GCS_BUCKET_NAME: ${{ env.GCS_BUCKET_NAME }}

      - name: Finalize E2E Check
        id: finalize_check
        # actions/github-script v8 (pinned)
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd
        with:
          github-token: ${{ steps.app_token.outputs.token }}
          script: |
            const buildStatus = '${{ steps.cloud_build.outputs.build_status }}'.toUpperCase();
            const buildId = '${{ steps.cloud_build.outputs.build_id }}';
            const buildLogUrl = '${{ steps.cloud_build.outputs.build_log_url }}';
            const artifactsUrl = '${{ steps.cloud_build.outputs.artifacts_url }}';

            let conclusion = 'failure';
            if (buildStatus === 'SUCCESS') {
              conclusion = 'success';
            } else if (buildStatus === 'CANCELLED' || buildStatus === 'TIMEOUT') {
              conclusion = 'cancelled';
            }

            const summaryLines = [
              `Google Cloud Build E2E tests finished: **${buildStatus || 'UNKNOWN'}**.`,
              buildId ? `Build ID: ${buildId}` : null,
              buildLogUrl ? `[View Cloud Build Logs](${buildLogUrl})` : null,
              artifactsUrl ? `[Browse Test Artifacts in GCS](${artifactsUrl})` : null
            ].filter(Boolean);

            await github.rest.checks.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              check_run_id: Number('${{ steps.create_check.outputs.check_run_id }}'),
              details_url: buildLogUrl || undefined,
              external_id: '${{ steps.run_id.outputs.e2e_run_id }}',
              status: 'completed',
              conclusion,
              completed_at: new Date().toISOString(),
              output: {
                title: process.env.CHECK_RUN_NAME,
                summary: summaryLines.join('\n')
              }
            });

            core.setOutput('ok', conclusion === 'success' ? 'true' : 'false');
        env:
          CHECK_RUN_NAME: ${{ env.CHECK_RUN_NAME }}

      - name: Fail workflow when E2E failed
        if: steps.finalize_check.outputs.ok != 'true'
        run: |
          echo "E2E build status: ${{ steps.cloud_build.outputs.build_status }}"
          exit 1

      - name: Add PR Comment
        if: ${{ steps.target.outputs.pr_number != '' }}
        # actions/github-script v8 (pinned)
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd
        with:
          script: |
            const body = [
              'E2E tests manually triggered by @' + context.actor,
              '',
              'View progress in the E2E Tests (GCP) check:',
              `https://github.com/${context.repo.owner}/${context.repo.repo}/pull/${{ steps.target.outputs.pr_number }}/checks`
            ].join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: Number('${{ steps.target.outputs.pr_number }}'),
              body
            });
