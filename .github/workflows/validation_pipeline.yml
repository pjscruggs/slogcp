name: Validation Pipeline
on:
  pull_request:
    branches: [ main ]
  pull_request_target:
    branches: [ main ]
    types: [opened, reopened, synchronize, labeled]
  merge_group:
    branches: [ main ]
  workflow_dispatch:
  workflow_call:

permissions:
  contents: read
  pull-requests: read

jobs:
  # ----------------------------------
  # CLASSIFY VALIDATION SCOPE FOR PRS
  # ----------------------------------
  classify_validation_scope:
    name: Classify Validation Scope
    if: github.event_name != 'pull_request_target'
    runs-on: ubuntu-latest
    outputs:
      mode: ${{ steps.classify.outputs.mode }}
    steps:
      - name: Classify changed files
        id: classify
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9
        with:
          script: |
            let mode = 'normal';

            if (context.eventName === 'pull_request') {
              const files = await github.paginate(github.rest.pulls.listFiles, {
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: context.payload.pull_request.number,
                per_page: 100
              });

              const paths = files.map(f => f.filename);
              const touchesGoModuleMetadata = paths.some(p => /(^|\/)go\.(mod|sum)$/.test(p));
              const onlyCiFiles = paths.length > 0 && paths.every(p => p.startsWith('.github/'));
              const onlyAutomationConfigFiles = paths.length > 0 &&
                paths.every(p => p === 'renovate.json');
              const onlyExampleModuleMetadata = paths.length > 0 &&
                paths.every(p => /^\.examples\/.+\/go\.(mod|sum)$/.test(p));
              const touchesRootGoModuleMetadata = paths.some(p => /^go\.(mod|sum)$/.test(p));
              const allowedSecurityFloorMetadata = p =>
                p === 'go.mod' ||
                p === 'go.sum' ||
                p === 'version.go' ||
                /^\.examples\/.+\/go\.(mod|sum)$/.test(p);
              const securityFloorFileScope = paths.length > 0 &&
                paths.every(allowedSecurityFloorMetadata);
              const pr = context.payload.pull_request;
              const sameRepo = pr.head.repo.full_name === context.payload.repository.full_name;
              const actor = pr.user.login;
              const trustedRenovate = actor === 'renovate[bot]' || actor === 'app/renovate';
              const labels = new Set((pr.labels || []).map(label => label.name));
              const securityPattern = /(security|vulnerab|cve|ghsa)/i;
              const securityHint =
                labels.has('security') ||
                labels.has('security:floor') ||
                securityPattern.test(pr.title || '') ||
                securityPattern.test(pr.head.ref || '');
              const isRootToolchainOnly = paths.length === 1 &&
                paths[0] === 'go.mod' &&
                files.every(file => {
                  if (file.filename !== 'go.mod' || !file.patch) {
                    return false;
                  }
                  const changedLines = file.patch
                    .split('\n')
                    .filter(line =>
                      (line.startsWith('+') || line.startsWith('-')) &&
                      !line.startsWith('+++') &&
                      !line.startsWith('---')
                    );
                  return changedLines.length > 0 &&
                    changedLines.every(line => /^[+-]toolchain\s+go\d+\.\d+\.\d+\s*$/.test(line));
                });

              if (onlyCiFiles && !touchesGoModuleMetadata) {
                mode = 'ci_only';
              } else if (onlyAutomationConfigFiles) {
                mode = 'automation_config_only';
              } else if (sameRepo && trustedRenovate && onlyExampleModuleMetadata) {
                mode = 'examples_dependency';
              } else if (sameRepo && trustedRenovate && isRootToolchainOnly) {
                mode = 'toolchain_update';
              } else if (
                sameRepo &&
                trustedRenovate &&
                touchesRootGoModuleMetadata &&
                securityHint &&
                securityFloorFileScope
              ) {
                mode = 'security_floor';
              } else if (sameRepo && trustedRenovate) {
                mode = 'renovate_cloud_e2e';
              }
            }

            core.info(`Validation scope mode=${mode}`);
            core.setOutput('mode', mode);

  # -----------------------------
  # VALIDATION (runs actual code)
  # -----------------------------
  validation:
    name: Fix and Validate Code
    needs: classify_validation_scope
    # Skip validation on pull_request_target to avoid running the full pipeline twice per PR update.
    if: github.event_name != 'pull_request_target' && needs.classify_validation_scope.outputs.mode != 'ci_only' && needs.classify_validation_scope.outputs.mode != 'automation_config_only'
    runs-on: ubuntu-latest
    env:
      GOTOOLCHAIN: auto
    steps:
      - name: 🛒 Checkout Code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.ref || github.ref }}
          repository: ${{ github.event.pull_request.head.repo.full_name || github.repository }}
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: 🔍 Determine branch name
        id: get-branch
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_HEAD_REF: ${{ github.event.pull_request.head.ref }}
        run: |
          if [[ "$EVENT_NAME" == "pull_request" ]]; then
            echo "BRANCH_NAME=$PR_HEAD_REF" >> "$GITHUB_OUTPUT"
          else
            echo "BRANCH_NAME=${GITHUB_REF#refs/heads/}" >> "$GITHUB_OUTPUT"
          fi

      - name: Determine maintenance reconciliation policy
        id: maintenance-policy
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_HEAD_REPO_FULL_NAME: ${{ github.event.pull_request.head.repo.full_name }}
          REPOSITORY: ${{ github.repository }}
          BRANCH_NAME: ${{ steps.get-branch.outputs.BRANCH_NAME }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
          VALIDATION_MODE: ${{ needs.classify_validation_scope.outputs.mode }}
        run: |
          allow_push=false
          allow_go_sum_only_drift=false

          if [[ "$EVENT_NAME" == "pull_request" && "$PR_HEAD_REPO_FULL_NAME" == "$REPOSITORY" ]]; then
            allow_push=true
            if [[ "$VALIDATION_MODE" != "examples_dependency" && "$BRANCH_NAME" == renovate/* && ("$PR_AUTHOR" == "app/renovate" || "$PR_AUTHOR" == "renovate[bot]") ]]; then
              allow_push=false
              allow_go_sum_only_drift=true
            fi
          fi

          echo "allow_push=$allow_push" >> "$GITHUB_OUTPUT"
          echo "allow_go_sum_only_drift=$allow_go_sum_only_drift" >> "$GITHUB_OUTPUT"

      - name: 🔢 Determine Go version
        id: go-version
        run: |
          GO_VERSION=$(grep '^go ' go.mod | awk '{print $2}')
          if [ -z "$GO_VERSION" ]; then
            echo "Unable to determine Go version from go.mod" >&2
            exit 1
          fi

          GO_VERSION="$GO_VERSION" python3 .github/scripts/resolve_go_version.py

      - name: 🏗️ Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: ${{ steps.go-version.outputs.version }}
          cache: true

      - name: 🛠️ Install golangci-lint
        run: |
          # renovate: datasource=go depName=github.com/golangci/golangci-lint/v2 versioning=semver
          go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.12.2
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"
          
      - name: 🧰 Install format/modernize tools
        run: |
          # renovate: datasource=go depName=golang.org/x/tools versioning=semver
          go install golang.org/x/tools/cmd/goimports@v0.45.0
          # renovate: datasource=go depName=golang.org/x/tools/gopls versioning=semver
          go install golang.org/x/tools/gopls/internal/analysis/modernize/cmd/modernize@v0.22.0
          # renovate: datasource=go depName=github.com/apache/skywalking-eyes versioning=semver
          go install github.com/apache/skywalking-eyes/cmd/license-eye@v0.8.0

      - name: ✨ Apply Go formatting
        run: gofmt -w .

      - name: 🔧 Apply modernize fixes
        run: modernize -fix -test ./...

      - name: 🧹 Ensure module metadata is tidy
        run: |
          go mod tidy

      - name: 🧹 Ensure example module metadata is tidy
        run: |
          set -euo pipefail
          if [ ! -d ".examples" ]; then
            echo "No .examples directory found; skipping example module tidy."
            exit 0
          fi

          modules_found=0
          while IFS= read -r -d '' mod; do
            modules_found=1
            dir=$(dirname "$mod")
            echo "::group::go mod tidy $dir"
            (cd "$dir" && go mod tidy)
            echo "::endgroup::"
          done < <(find .examples -name go.mod -print0)

          if [ "$modules_found" -eq 0 ]; then
            echo "No example go.mod files found under .examples; skipping."
          fi

      - name: 🧹 Sync example Go directives
        if: github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'renovate:go-version')
        run: python3 .github/scripts/sync_example_go_versions.py

      - name: 📅🕰️ Get current year in US Central Time
        id: year
        run: |
          YEAR=$(TZ='America/Chicago' date +%Y)
          echo "YEAR=$YEAR" >> $GITHUB_OUTPUT
      
      - name: 📄⚙️📅 Update license year in config
        run: |
          sed -i 's/copyright-year: .*/copyright-year: "2025-${{ steps.year.outputs.YEAR }}"/g' .licenserc.yaml
          echo "📅⬆️ Updated year to 2025-${{ steps.year.outputs.YEAR }}"

      - name: 📄🧭 Verify `.e2e` license header scope
        run: |
          grep -Fq ".e2e/scripts/**/*.sh" .licenserc.yaml
          grep -Fq ".e2e/local/scripts/**/*.sh" .licenserc.yaml
      
      - name: 📄🩹 Fix License Headers
        id: fix-license
        run: license-eye header fix -c .licenserc.yaml

      - name: ♻️ Restore Go toolchain (post-license-fix)
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: ${{ steps.go-version.outputs.version }}
          cache: true
      
      - name: 🧐 Apply Lint Fixes
        run: golangci-lint run --fix ./...
        continue-on-error: true
      
      - name: Generate Maintenance Push Token
        if: steps.maintenance-policy.outputs.allow_push == 'true'
        id: maintenance_push_token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3
        with:
          app-id: ${{ secrets.E2E_APP_ID }}
          private-key: ${{ secrets.E2E_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: ${{ github.event.repository.name }}
          permission-contents: write

      - name: 💾 Commit All Fixes
        id: commit-fixes
        if: steps.maintenance-policy.outputs.allow_push == 'true'
        env:
          BRANCH_NAME: ${{ steps.get-branch.outputs.BRANCH_NAME }}
          GH_TOKEN: ${{ steps.maintenance_push_token.outputs.token }}
        run: |
          set -euo pipefail

          git check-ref-format --branch "$BRANCH_NAME" >/dev/null
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet; then
            echo "committed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git add .
          git commit -m "chore: apply code maintenance (formatting, linting, license headers)"
          gh auth setup-git
          git push origin "HEAD:refs/heads/${BRANCH_NAME}"
          echo "committed=true" >> "$GITHUB_OUTPUT"
          
      - name: 🔄 Re-checkout after fixes if needed
        if: steps.maintenance-policy.outputs.allow_push == 'true' && steps.commit-fixes.outputs.committed == 'true'
        env:
          BRANCH_NAME: ${{ steps.get-branch.outputs.BRANCH_NAME }}
        run: |
          set -euo pipefail

          git check-ref-format --branch "$BRANCH_NAME" >/dev/null
          git fetch origin "refs/heads/${BRANCH_NAME}:refs/remotes/origin/${BRANCH_NAME}"
          git checkout --detach "refs/remotes/origin/${BRANCH_NAME}"

      - name: ✅ Ensure working tree is clean
        run: |
          if git diff --quiet; then
            exit 0
          fi

          echo "Working tree has uncommitted changes after maintenance steps."
          git status --short

          if [[ "${{ steps.maintenance-policy.outputs.allow_go_sum_only_drift }}" == "true" ]]; then
            NON_GOSUM_CHANGES="$(git diff --name-only | grep -Ev '(^|/)go\.sum$' || true)"
            if [[ -z "$NON_GOSUM_CHANGES" ]]; then
              echo "Only go.sum files changed on a protected Renovate branch; continuing without auto-push."
              exit 0
            fi
          fi

          exit 1

      - name: 🧐 Verify Linting
        run: golangci-lint run ./...
      
      - name: 📄✅ Verify License Headers
        run: license-eye header check -c .licenserc.yaml

      - name: ✅ Verify example Go directives
        if: github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'renovate:go-version')
        run: python3 .github/scripts/sync_example_go_versions.py --check

      - name: ♻️ Restore Go toolchain (pre-tests)
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: ${{ steps.go-version.outputs.version }}
          cache: true

      - name: Install Go Test Tools
        run: |
          # renovate: datasource=go depName=github.com/mfridman/tparse versioning=semver
          go install github.com/mfridman/tparse@v0.18.0

      - name: Run Go Tests
        if: success()
        id: go-tests
        run: |
          go test -json -race -coverprofile=coverage.out ./... | tparse -all -notests

      - name: Verify Example Modules
        if: success()
        run: |
          set -euo pipefail
          if [ ! -d ".examples" ]; then
            echo "No .examples directory found; skipping example verification."
            exit 0
          fi

          examples_found=0
          while IFS= read -r -d '' mod; do
            examples_found=1
            dir=$(dirname "$mod")
            echo "::group::go test $dir"
            (cd "$dir" && go test ./...)
            echo "::endgroup::"
          done < <(find .examples -name go.mod -print0)

          if [ "$examples_found" -eq 0 ]; then
            echo "No example go.mod files found under .examples; skipping."
          fi

      - name: Verify .e2e Modules
        if: success()
        run: |
          set -euo pipefail
          if [ ! -d ".e2e" ]; then
            echo "No .e2e directory found; skipping .e2e local tests."
            exit 0
          fi

          modules_found=0
          while IFS= read -r -d '' mod; do
            modules_found=1
            dir=$(dirname "$mod")
            echo "::group::go test $dir"
            (cd "$dir" && go test ./...)
            echo "::endgroup::"
          done < <(find .e2e -name go.mod -print0)

          if [ "$modules_found" -eq 0 ]; then
            echo "No .e2e go.mod files found; skipping .e2e local tests."
          fi

      - name: Print Coverage Report
        if: always()
        run: |
          echo "--- Test Coverage ---"
          if [ -f coverage.out ]; then
            cat coverage.out
          else
            echo "Coverage file (coverage.out) not found."
          fi
          echo "---------------------"
      
      - name: 🛡️🔍 Run Vulnerability Check
        run: |
          echo "Installing govulncheck..."
          # renovate: datasource=go depName=golang.org/x/vuln versioning=semver
          go install golang.org/x/vuln/cmd/govulncheck@v1.3.0
          echo "Running vulnerability check..."
          govulncheck ./...

  # ---------------------------------------
  # STABLE LOCAL VALIDATION CHECK FOR MERGE POLICY
  # ---------------------------------------
  local_validation_policy:
    name: Local Validation Policy
    needs:
      - classify_validation_scope
      - validation
    if: always() && github.event_name != 'pull_request_target'
    runs-on: ubuntu-latest
    steps:
      - name: Evaluate scoped local validation result
        shell: bash
        env:
          MODE: ${{ needs.classify_validation_scope.outputs.mode }}
          REPO_VALIDATION_RESULT: ${{ needs.validation.result }}
        run: |
          set -euo pipefail

          if [[ "$MODE" == "ci_only" || "$MODE" == "automation_config_only" ]]; then
            echo "CI-only or automation config-only change requires no local or cloud tests."
            exit 0
          fi

          if [[ "$REPO_VALIDATION_RESULT" == "success" ]]; then
            echo "Repo-wide validation passed."
            exit 0
          fi

          echo "Repo-wide change expected Fix and Validate Code=success, got: $REPO_VALIDATION_RESULT"
          exit 1

  local_validation_ready_for_e2e:
    name: Local Validation Ready for E2E
    needs:
      - local_validation_policy
    if: always() && github.event_name != 'pull_request_target'
    runs-on: ubuntu-latest
    steps:
      - name: Mirror Local Validation Policy result for E2E gatekeeping
        shell: bash
        env:
          LOCAL_VALIDATION_POLICY_RESULT: ${{ needs.local_validation_policy.result }}
        run: |
          set -euo pipefail
          if [[ "$LOCAL_VALIDATION_POLICY_RESULT" == "success" ]]; then
            echo "Local Validation Policy completed successfully."
            exit 0
          fi

          echo "Local Validation Policy result: $LOCAL_VALIDATION_POLICY_RESULT"
          exit 1

  # -------------------------------------------------------
  # E2E GATEKEEPER (PR-target; API-only; uses repo secrets)
  # -------------------------------------------------------
  e2e_gatekeeper:
    name: E2E Test Gatekeeper
    if: github.event_name == 'pull_request_target'
    env:
      CHECK_RUN_NAME: E2E Tests (GCP)
      LOCAL_VALIDATION_CHECK_NAME: Local Validation Ready for E2E
      GCS_BUCKET_NAME: ${{ secrets.GCP_E2E_ARTIFACTS_BUCKET }}
      GCS_SOURCE_STAGING_DIR: gs://${{ secrets.GCP_E2E_ARTIFACTS_BUCKET }}/cloudbuild/source
      GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
      GITHUB_TOKEN_SECRET_VERSION: projects/${{ secrets.GCP_PROJECT_ID }}/secrets/${{ secrets.GCP_GITHUB_TOKEN_SECRET_NAME }}/versions/latest
      ARTIFACT_REGISTRY_REPO: ${{ secrets.GCP_E2E_ARTIFACT_REGISTRY_REPO }}
      E2E_SERVICE_ACCOUNT: ${{ secrets.GCP_E2E_RUNTIME_SERVICE_ACCOUNT_EMAIL }}
      E2E_CALLER_SERVICE_ACCOUNT: ${{ secrets.GCP_E2E_CLOUD_BUILD_SERVICE_ACCOUNT_EMAIL }}
      TRACE_PUBSUB_TOPIC: ${{ secrets.GCP_E2E_TRACE_PUBSUB_TOPIC }}
      TRACE_PUBSUB_SUBSCRIPTION: ${{ secrets.GCP_E2E_TRACE_PUBSUB_SUBSCRIPTION }}
      RUN_REGION: ${{ secrets.GCP_E2E_RUN_REGION }}
    concurrency:
      group: e2e-gate-${{ github.event.pull_request.number || github.run_id }}
      cancel-in-progress: true
    runs-on: ubuntu-latest
    timeout-minutes: 180
    permissions:
      checks: read
      contents: read
      pull-requests: read
      id-token: write
    
    steps:
      - name: Classify PR Scope
        id: pr_scope
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9
        with:
          script: |
            const files = await github.paginate(github.rest.pulls.listFiles, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number,
              per_page: 100
            });

            const paths = files.map(f => f.filename);
            const touchesGoModuleMetadata = paths.some(p => /(^|\/)go\.(mod|sum)$/.test(p));
            const onlyCiFiles = paths.length > 0 && paths.every(p => p.startsWith('.github/'));
            const onlyAutomationConfigFiles = paths.length > 0 &&
              paths.every(p => p === 'renovate.json');
            const onlyExampleModuleMetadata = paths.length > 0 &&
              paths.every(p => /^\.examples\/.+\/go\.(mod|sum)$/.test(p));
            const touchesRootGoModuleMetadata = paths.some(p => /^go\.(mod|sum)$/.test(p));
            const allowedSecurityFloorMetadata = p =>
              p === 'go.mod' ||
              p === 'go.sum' ||
              p === 'version.go' ||
              /^\.examples\/.+\/go\.(mod|sum)$/.test(p);
            const securityFloorFileScope = paths.length > 0 &&
              paths.every(allowedSecurityFloorMetadata);
            const pr = context.payload.pull_request;
            const sameRepo = pr.head.repo.full_name === context.payload.repository.full_name;
            const actor = pr.user.login;
            const trustedRenovate = actor === 'renovate[bot]' || actor === 'app/renovate';
            const labels = new Set((pr.labels || []).map(label => label.name));
            const securityPattern = /(security|vulnerab|cve|ghsa)/i;
            const securityHint =
              labels.has('security') ||
              labels.has('security:floor') ||
              securityPattern.test(pr.title || '') ||
              securityPattern.test(pr.head.ref || '');
            const isRootToolchainOnly = paths.length === 1 &&
              paths[0] === 'go.mod' &&
              files.every(file => {
                if (file.filename !== 'go.mod' || !file.patch) {
                  return false;
                }
                const changedLines = file.patch
                  .split('\n')
                  .filter(line =>
                    (line.startsWith('+') || line.startsWith('-')) &&
                    !line.startsWith('+++') &&
                    !line.startsWith('---')
                  );
                return changedLines.length > 0 &&
                  changedLines.every(line => /^[+-]toolchain\s+go\d+\.\d+\.\d+\s*$/.test(line));
              });

            let mode = 'normal';
            if (onlyCiFiles && !touchesGoModuleMetadata) {
              mode = 'ci_only';
            } else if (onlyAutomationConfigFiles) {
              mode = 'automation_config_only';
            } else if (sameRepo && trustedRenovate && onlyExampleModuleMetadata) {
              mode = 'examples_dependency';
            } else if (sameRepo && trustedRenovate && isRootToolchainOnly) {
              mode = 'toolchain_update';
            } else if (
              sameRepo &&
              trustedRenovate &&
              touchesRootGoModuleMetadata &&
              securityHint &&
              securityFloorFileScope
            ) {
              mode = 'security_floor';
            } else if (sameRepo && trustedRenovate) {
              mode = 'renovate_cloud_e2e';
            }

            core.info(`Classified PR mode=${mode}; changed files=${paths.length}`);
            core.setOutput('mode', mode);

      - name: Determine Automatic Policy Path
        id: trigger_type
        run: |
          if [[ "${{ github.event.pull_request.head.repo.full_name }}" == "${{ github.repository }}" && ("${{ steps.pr_scope.outputs.mode }}" == "ci_only" || "${{ steps.pr_scope.outputs.mode }}" == "automation_config_only" || "${{ steps.pr_scope.outputs.mode }}" == "examples_dependency" || "${{ steps.pr_scope.outputs.mode }}" == "toolchain_update" || "${{ steps.pr_scope.outputs.mode }}" == "security_floor" || "${{ steps.pr_scope.outputs.mode }}" == "renovate_cloud_e2e") ]]; then
            echo "should_auto_trigger=true" >> $GITHUB_OUTPUT
          else
            echo "should_auto_trigger=false" >> $GITHUB_OUTPUT
          fi

      - name: Detect E2E app token secrets
        id: app_token_secrets
        env:
          E2E_APP_ID: ${{ secrets.E2E_APP_ID }}
          E2E_APP_PRIVATE_KEY: ${{ secrets.E2E_APP_PRIVATE_KEY }}
        run: |
          if [[ -n "$E2E_APP_ID" && -n "$E2E_APP_PRIVATE_KEY" ]]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Require E2E app token for app-owned writes
        if: steps.app_token_secrets.outputs.available != 'true'
        run: |
          echo "E2E GitHub App credentials are required for app-owned checks, security version commits, and auto-merge." >&2
          exit 1

      - name: Generate App Token for Security Version Bump
        if: |
          steps.app_token_secrets.outputs.available == 'true' &&
          steps.trigger_type.outputs.should_auto_trigger == 'true' &&
          steps.pr_scope.outputs.mode == 'security_floor'
        id: version_bump_token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3
        with:
          app-id: ${{ secrets.E2E_APP_ID }}
          private-key: ${{ secrets.E2E_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: ${{ github.event.repository.name }}
          permission-contents: write
          permission-pull-requests: read

      - name: Ensure security floor release version is committed
        if: |
          steps.trigger_type.outputs.should_auto_trigger == 'true' &&
          steps.pr_scope.outputs.mode == 'security_floor'
        id: security_release_version
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9
        with:
          github-token: ${{ steps.version_bump_token.outputs.token }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const pull_number = context.payload.pull_request.number;
            const expectedSha = context.payload.pull_request.head.sha;

            const parseVersion = (value) => {
              const match = /^v(\d+)\.(\d+)\.(\d+)$/.exec(value || '');
              if (!match) return null;
              return match.slice(1).map(Number);
            };
            const compareVersions = (a, b) => {
              const pa = parseVersion(a);
              const pb = parseVersion(b);
              if (!pa || !pb) return 0;
              for (let i = 0; i < 3; i++) {
                if (pa[i] !== pb[i]) return pa[i] - pb[i];
              }
              return 0;
            };

            const { data: pr } = await github.rest.pulls.get({
              owner,
              repo,
              pull_number
            });

            if (pr.head.sha !== expectedSha) {
              core.info(`PR head is already ${pr.head.sha}; this run was for ${expectedSha}.`);
              core.setOutput('committed', 'true');
              return;
            }

            const files = await github.paginate(github.rest.pulls.listFiles, {
              owner,
              repo,
              pull_number,
              per_page: 100
            });
            if (files.some(file => file.filename === 'version.go')) {
              core.info('version.go is already part of this security-floor PR.');
              core.setOutput('committed', 'false');
              return;
            }

            const tags = await github.paginate(github.rest.repos.listTags, {
              owner,
              repo,
              per_page: 100
            });
            const versions = tags
              .map(tag => tag.name)
              .filter(name => parseVersion(name))
              .sort(compareVersions);
            const latestTag = versions.at(-1) || 'v0.0.0';
            const [major, minor, patch] = parseVersion(latestTag);
            const nextCandidate = `v${major}.${minor}.${patch + 1}`;

            const { data: file } = await github.rest.repos.getContent({
              owner,
              repo,
              path: 'version.go',
              ref: pr.head.sha
            });
            if (Array.isArray(file) || !file.content || !file.sha) {
              core.setFailed('Unable to read version.go from the PR head.');
              return;
            }

            const content = Buffer.from(file.content, 'base64').toString('utf8');
            const match = /^var Version = "(v\d+\.\d+\.\d+)"/m.exec(content);
            if (!match) {
              core.setFailed('Unable to parse Version from version.go.');
              return;
            }

            const currentVersion = match[1];
            const nextVersion = compareVersions(nextCandidate, currentVersion) > 0
              ? nextCandidate
              : currentVersion;
            const updated = content.replace(
              /^var Version = "v\d+\.\d+\.\d+"/m,
              `var Version = "${nextVersion}"`
            );

            if (updated === content) {
              core.info(`version.go is already at ${nextVersion}.`);
              core.setOutput('committed', 'false');
              return;
            }

            await github.rest.repos.createOrUpdateFileContents({
              owner,
              repo,
              path: 'version.go',
              branch: pr.head.ref,
              sha: file.sha,
              message: `chore(security): bump release version to ${nextVersion}`,
              content: Buffer.from(updated, 'utf8').toString('base64')
            });

            core.info(`Committed ${nextVersion} to ${pr.head.ref}; a synchronize run will validate and gate the new SHA.`);
            core.setOutput('committed', 'true');

      - name: Generate App Token for Initial E2E Check Writes
        if: |
          steps.app_token_secrets.outputs.available == 'true' &&
          steps.security_release_version.outputs.committed != 'true'
        id: check_start_token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3
        with:
          app-id: ${{ secrets.E2E_APP_ID }}
          private-key: ${{ secrets.E2E_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: ${{ github.event.repository.name }}
          permission-checks: write

      - name: Finalize E2E check for no-cloud manual PRs
        if: |
          steps.trigger_type.outputs.should_auto_trigger == 'false' &&
          (steps.pr_scope.outputs.mode == 'ci_only' || steps.pr_scope.outputs.mode == 'automation_config_only')
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9
        with:
          github-token: ${{ steps.check_start_token.outputs.token }}
          script: |
            const checkName = process.env.CHECK_RUN_NAME;
            const mode = '${{ steps.pr_scope.outputs.mode }}';
            const headSha = context.payload.pull_request.head.sha;
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const queuedSummary = mode === 'automation_config_only'
              ? 'Skipping E2E for an automation config-only PR.'
              : 'Skipping E2E for a CI-only PR.';
            const finalSummary = mode === 'automation_config_only'
              ? 'PR touches only Renovate configuration. Cloud E2E is skipped by policy.'
              : 'PR touches only CI files and no go.mod/go.sum files. Cloud E2E is skipped by policy.';
            const { data: checkRun } = await github.rest.checks.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              name: checkName,
              head_sha: headSha,
              status: 'queued',
              output: { title: checkName, summary: queuedSummary }
            });

            await github.rest.checks.update({
              owner,
              repo,
              check_run_id: checkRun.id,
              status: 'completed',
              conclusion: 'skipped',
              completed_at: new Date().toISOString(),
              output: {
                title: checkName,
                summary: finalSummary
              }
            });
        env:
          CHECK_RUN_NAME: ${{ env.CHECK_RUN_NAME }}

      - name: Create Manual Gatekeeper Check (queued)
        if: |
          steps.trigger_type.outputs.should_auto_trigger == 'false' &&
          steps.pr_scope.outputs.mode == 'normal'
        id: manual_check
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9
        with:
          github-token: ${{ steps.check_start_token.outputs.token }}
          script: |
            const checkName = 'E2E Tests (GCP)';
            const sha = context.payload.pull_request.head.sha;
            const { data: checkRun } = await github.rest.checks.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              name: checkName,
              head_sha: sha,
              status: 'queued',
              output: { title: checkName, summary: 'E2E tests are queued...' }
            });
            core.setOutput('check_run_id', checkRun.id);

      - name: Update Check for Manual Trigger Required
        if: |
          steps.trigger_type.outputs.should_auto_trigger == 'false' &&
          steps.pr_scope.outputs.mode == 'normal'
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9
        with:
          github-token: ${{ steps.check_start_token.outputs.token }}
          script: |
            await github.rest.checks.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              check_run_id: ${{ steps.manual_check.outputs.check_run_id }},
              status: 'completed',
              conclusion: 'action_required',
              completed_at: new Date().toISOString(),
              output: {
                title: 'E2E Tests (GCP) - Manual Trigger Required',
                summary: `⚠️ E2E tests require manual trigger by a maintainer after code review and after Local Validation Policy passes.

                A repository maintainer can trigger E2E tests by:
                1. Going to Actions → "Manual E2E Test Trigger" workflow
                2. Click "Run workflow" and enter PR number: ${{ github.event.pull_request.number }}

                This check must pass before the PR can be merged.`
              }
            });

      - name: Generate E2E Run ID
        if: |
          steps.trigger_type.outputs.should_auto_trigger == 'true' &&
          steps.security_release_version.outputs.committed != 'true'
        id: run_id
        shell: bash
        run: |
          echo "e2e_run_id=$(date -u +%Y%m%dT%H%M%S)-$RANDOM" >> "$GITHUB_OUTPUT"

      - name: Checkout Workflow Repository
        if: |
          steps.trigger_type.outputs.should_auto_trigger == 'true' &&
          steps.security_release_version.outputs.committed != 'true'
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Checkout Target Source For Cloud E2E
        if: |
          steps.trigger_type.outputs.should_auto_trigger == 'true' &&
          steps.security_release_version.outputs.committed != 'true' &&
          (steps.pr_scope.outputs.mode == 'security_floor' || steps.pr_scope.outputs.mode == 'renovate_cloud_e2e')
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 1
          persist-credentials: false
          ref: ${{ github.event.pull_request.head.sha }}
          path: e2e-target-source

      - name: Create Stable E2E Check (in progress)
        if: |
          steps.trigger_type.outputs.should_auto_trigger == 'true' &&
          steps.security_release_version.outputs.committed != 'true'
        id: create_run_check
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9
        with:
          github-token: ${{ steps.check_start_token.outputs.token }}
          script: |
            const runId = '${{ steps.run_id.outputs.e2e_run_id }}';
            const mode = '${{ steps.pr_scope.outputs.mode }}';
            const name = process.env.CHECK_RUN_NAME;
            let summary = `Waiting for local validation to pass before starting Google Cloud Build E2E run ${runId}.`;
            if (mode === 'ci_only') {
              summary = 'No local or cloud tests are required for a PR that touched only CI files and no go.mod/go.sum files. The cloud E2E check will be skipped after the fast-path policy check passes.';
            } else if (mode === 'automation_config_only') {
              summary = 'Automation config-only change detected. The cloud E2E check will be skipped after the fast-path policy check passes.';
            } else if (mode === 'examples_dependency') {
              summary = 'Example module dependency update detected. Local validation includes example module smoke tests; cloud E2E will be skipped after that policy check passes.';
            } else if (mode === 'toolchain_update') {
              summary = 'Root go.mod toolchain-only update detected. Local validation runs with the new toolchain; cloud E2E will be skipped after local validation passes because imported slogcp consumers are unaffected.';
            } else if (mode === 'renovate_cloud_e2e') {
              summary = `Trusted Renovate PR detected. Waiting for local validation to pass before starting Google Cloud Build E2E run ${runId}.`;
            }
            const sha = context.payload.pull_request.head.sha;
            const { data: checkRun } = await github.rest.checks.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              name,
              head_sha: sha,
              status: 'in_progress',
              external_id: runId,
              started_at: new Date().toISOString(),
              output: {
                title: name,
                summary
              }
            });
            core.setOutput('check_run_id', checkRun.id);
        env:
          CHECK_RUN_NAME: ${{ env.CHECK_RUN_NAME }}

      - name: Wait for scoped local validation to succeed
        if: |
          steps.trigger_type.outputs.should_auto_trigger == 'true' &&
          steps.security_release_version.outputs.committed != 'true'
        id: wait_validation
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9
        with:
          github-token: ${{ github.token }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const ref = context.payload.pull_request.head.sha;
            const targetCheckName = process.env.LOCAL_VALIDATION_CHECK_NAME;
            const sleep = (ms) => new Promise(r => setTimeout(r, ms));
            const maxMinutes = 120;
            const sleepMs = 60_000;

            for (let minute = 0; minute < maxMinutes; minute++) {
              const { data } = await github.rest.checks.listForRef({
                owner,
                repo,
                ref,
                per_page: 100
              });
              const validationRuns = [...data.check_runs]
                .filter(run => run.name === targetCheckName);
              const skippedCount = validationRuns
                .filter(run => run.status === 'completed' && run.conclusion === 'skipped')
                .length;
              const checkRun = validationRuns
                .filter(run => run.status !== 'completed' || run.conclusion !== 'skipped')
                .sort((a, b) => Number(b.id || 0) - Number(a.id || 0))[0];
              const status = checkRun?.status ?? 'not_found';
              const conclusion = checkRun?.conclusion ?? 'unknown';
              const skippedSummary = skippedCount
                ? ` Ignored ${skippedCount} skipped ${targetCheckName} duplicate(s).`
                : '';

              if (!checkRun || status !== 'completed') {
                core.info(`Waiting for ${targetCheckName} to finish (elapsed ${minute + 1}/${maxMinutes} minutes). Current status: ${status}.${skippedSummary}`);
                await sleep(sleepMs);
                continue;
              }

              if (conclusion === 'success') {
                core.setOutput('ok', 'true');
                core.setOutput('conclusion', 'success');
                core.setOutput('summary', `${targetCheckName} succeeded.`);
                return;
              }

              core.setOutput('ok', 'false');
              core.setOutput('conclusion', 'failure');
              core.setOutput('summary', `${targetCheckName} conclusion: ${conclusion}.`);
              return;
            }

            core.setOutput('ok', 'false');
            core.setOutput('conclusion', 'action_required');
            core.setOutput('summary', `${targetCheckName} did not complete within ${maxMinutes} minutes.`);
        env:
          CHECK_RUN_NAME: ${{ env.CHECK_RUN_NAME }}
          LOCAL_VALIDATION_CHECK_NAME: ${{ env.LOCAL_VALIDATION_CHECK_NAME }}

      - name: Detect GCP E2E secret availability
        if: |
          steps.trigger_type.outputs.should_auto_trigger == 'true' &&
          steps.security_release_version.outputs.committed != 'true' &&
          (steps.pr_scope.outputs.mode == 'security_floor' || steps.pr_scope.outputs.mode == 'renovate_cloud_e2e') &&
          steps.wait_validation.outputs.ok == 'true'
        id: have_secrets
        run: |
          if [ -n "${{ secrets.GCP_PROJECT_ID }}" ] &&
             [ -n "${{ secrets.GCP_VALIDATION_E2E_WIF_PROVIDER }}" ] &&
             [ -n "${{ secrets.GCP_VALIDATION_E2E_SERVICE_ACCOUNT_EMAIL }}" ] &&
             [ -n "${{ secrets.GCP_E2E_ARTIFACTS_BUCKET }}" ] &&
             [ -n "${{ secrets.GCP_GITHUB_TOKEN_SECRET_NAME }}" ] &&
             [ -n "${{ secrets.GCP_E2E_ARTIFACT_REGISTRY_REPO }}" ] &&
             [ -n "${{ secrets.GCP_E2E_RUNTIME_SERVICE_ACCOUNT_EMAIL }}" ] &&
             [ -n "${{ secrets.GCP_E2E_CLOUD_BUILD_SERVICE_ACCOUNT_EMAIL }}" ] &&
             [ -n "${{ secrets.GCP_E2E_TRACE_PUBSUB_TOPIC }}" ] &&
             [ -n "${{ secrets.GCP_E2E_TRACE_PUBSUB_SUBSCRIPTION }}" ] &&
             [ -n "${{ secrets.GCP_E2E_RUN_REGION }}" ]; then
            echo "ok=true" >> "$GITHUB_OUTPUT"
          else
            echo "ok=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Authenticate to Google Cloud
        if: |
          steps.trigger_type.outputs.should_auto_trigger == 'true' &&
          steps.security_release_version.outputs.committed != 'true' &&
          (steps.pr_scope.outputs.mode == 'security_floor' || steps.pr_scope.outputs.mode == 'renovate_cloud_e2e') &&
          steps.wait_validation.outputs.ok == 'true' &&
          steps.have_secrets.outputs.ok == 'true'
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3
        with:
          workload_identity_provider: ${{ secrets.GCP_VALIDATION_E2E_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_VALIDATION_E2E_SERVICE_ACCOUNT_EMAIL }}

      - name: Set up Cloud SDK
        if: |
          steps.trigger_type.outputs.should_auto_trigger == 'true' &&
          steps.security_release_version.outputs.committed != 'true' &&
          (steps.pr_scope.outputs.mode == 'security_floor' || steps.pr_scope.outputs.mode == 'renovate_cloud_e2e') &&
          steps.wait_validation.outputs.ok == 'true' &&
          steps.have_secrets.outputs.ok == 'true'
        uses: google-github-actions/setup-gcloud@aa5489c8933f4cc7a4f7d45035b3b1440c9c10db # v3

      - name: Run E2E Cloud Build
        if: |
          steps.trigger_type.outputs.should_auto_trigger == 'true' &&
          steps.security_release_version.outputs.committed != 'true' &&
          (steps.pr_scope.outputs.mode == 'security_floor' || steps.pr_scope.outputs.mode == 'renovate_cloud_e2e') &&
          steps.wait_validation.outputs.ok == 'true' &&
          steps.have_secrets.outputs.ok == 'true'
        id: cloud_build
        shell: bash
        run: |
          cd e2e-target-source
          bash ../.github/scripts/run_e2e_cloud_build.sh \
            --source-mode local \
            --trusted-e2e-root ../.e2e \
            --dependency-mode floor \
            --toolchain-mode repo
        env:
          LIB_REPO_FULL_NAME: ${{ github.repository }}
          PR_SHA: ${{ github.event.pull_request.head.sha }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          CHECK_RUN_ID: ${{ steps.create_run_check.outputs.check_run_id }}
          LIB_RUN_ID: ${{ github.run_id }}
          E2E_RUN_ID: ${{ steps.run_id.outputs.e2e_run_id }}
          GCP_PROJECT_ID: ${{ env.GCP_PROJECT_ID }}
          GITHUB_TOKEN_SECRET_VERSION: ${{ env.GITHUB_TOKEN_SECRET_VERSION }}
          ARTIFACT_REGISTRY_REPO: ${{ env.ARTIFACT_REGISTRY_REPO }}
          E2E_SERVICE_ACCOUNT: ${{ env.E2E_SERVICE_ACCOUNT }}
          E2E_CALLER_SERVICE_ACCOUNT: ${{ env.E2E_CALLER_SERVICE_ACCOUNT }}
          TRACE_PUBSUB_TOPIC: ${{ env.TRACE_PUBSUB_TOPIC }}
          TRACE_PUBSUB_SUBSCRIPTION: ${{ env.TRACE_PUBSUB_SUBSCRIPTION }}
          RUN_REGION: ${{ env.RUN_REGION }}
          GCS_BUCKET_NAME: ${{ env.GCS_BUCKET_NAME }}
          GCS_SOURCE_STAGING_DIR: ${{ env.GCS_SOURCE_STAGING_DIR }}

      - name: Generate App Token for Cloud E2E Finalization
        if: |
          always() &&
          steps.app_token_secrets.outputs.available == 'true' &&
          steps.trigger_type.outputs.should_auto_trigger == 'true' &&
          steps.security_release_version.outputs.committed != 'true' &&
          (steps.pr_scope.outputs.mode == 'security_floor' || steps.pr_scope.outputs.mode == 'renovate_cloud_e2e') &&
          steps.wait_validation.outputs.ok == 'true' &&
          steps.have_secrets.outputs.ok == 'true'
        id: cloud_finalize_token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3
        with:
          app-id: ${{ secrets.E2E_APP_ID }}
          private-key: ${{ secrets.E2E_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: ${{ github.event.repository.name }}
          permission-checks: write

      - name: Finalize stable E2E check after Cloud Build
        if: |
          always() &&
          steps.trigger_type.outputs.should_auto_trigger == 'true' &&
          steps.security_release_version.outputs.committed != 'true' &&
          (steps.pr_scope.outputs.mode == 'security_floor' || steps.pr_scope.outputs.mode == 'renovate_cloud_e2e') &&
          steps.wait_validation.outputs.ok == 'true' &&
          steps.have_secrets.outputs.ok == 'true'
        id: finalize_check
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9
        with:
          github-token: ${{ steps.cloud_finalize_token.outputs.token }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const checkRunId = Number('${{ steps.create_run_check.outputs.check_run_id }}') || 0;
            const runId = '${{ steps.run_id.outputs.e2e_run_id }}';
            const buildStatus = '${{ steps.cloud_build.outputs.build_status }}'.toUpperCase();
            const buildId = '${{ steps.cloud_build.outputs.build_id }}';
            const buildLogUrl = '${{ steps.cloud_build.outputs.build_log_url }}';
            const artifactsUrl = '${{ steps.cloud_build.outputs.artifacts_url }}';

            let conclusion = 'failure';
            if (buildStatus === 'SUCCESS') {
              conclusion = 'success';
            } else if (buildStatus === 'CANCELLED' || buildStatus === 'TIMEOUT') {
              conclusion = 'cancelled';
            }

            const summaryLines = [
              `Google Cloud Build E2E run \`${runId}\` finished: **${buildStatus || 'UNKNOWN'}**.`,
              buildId ? `Build ID: ${buildId}` : null,
              buildLogUrl ? `[View Cloud Build Logs](${buildLogUrl})` : null,
              artifactsUrl ? `[Browse Test Artifacts in GCS](${artifactsUrl})` : null
            ].filter(Boolean);

            await github.rest.checks.update({
              owner,
              repo,
              check_run_id: checkRunId,
              details_url: buildLogUrl || undefined,
              external_id: runId,
              status: 'completed',
              conclusion,
              completed_at: new Date().toISOString(),
              output: {
                title: process.env.CHECK_RUN_NAME,
                summary: summaryLines.join('\n')
              }
            });

            core.setOutput('ok', conclusion === 'success' ? 'true' : 'false');
        env:
          CHECK_RUN_NAME: ${{ env.CHECK_RUN_NAME }}

      - name: Fail workflow when Cloud E2E failed
        if: |
          always() &&
          steps.trigger_type.outputs.should_auto_trigger == 'true' &&
          steps.security_release_version.outputs.committed != 'true' &&
          (steps.pr_scope.outputs.mode == 'security_floor' || steps.pr_scope.outputs.mode == 'renovate_cloud_e2e') &&
          steps.wait_validation.outputs.ok == 'true' &&
          steps.have_secrets.outputs.ok == 'true' &&
          steps.finalize_check.outputs.ok != 'true'
        run: |
          echo "Cloud E2E did not complete successfully."
          echo "Cloud Build status: ${{ steps.cloud_build.outputs.build_status }}"
          exit 1

      - name: Generate App Token for Security Auto-Merge
        if: |
          steps.app_token_secrets.outputs.available == 'true' &&
          steps.trigger_type.outputs.should_auto_trigger == 'true' &&
          steps.security_release_version.outputs.committed != 'true' &&
          steps.pr_scope.outputs.mode == 'security_floor' &&
          steps.wait_validation.outputs.ok == 'true' &&
          steps.have_secrets.outputs.ok == 'true' &&
          steps.finalize_check.outputs.ok == 'true'
        id: auto_merge_token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3
        with:
          app-id: ${{ secrets.E2E_APP_ID }}
          private-key: ${{ secrets.E2E_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: ${{ github.event.repository.name }}
          permission-contents: write
          permission-pull-requests: write

      - name: Auto-merge security floor PR after E2E
        if: |
          steps.trigger_type.outputs.should_auto_trigger == 'true' &&
          steps.security_release_version.outputs.committed != 'true' &&
          steps.pr_scope.outputs.mode == 'security_floor' &&
          steps.wait_validation.outputs.ok == 'true' &&
          steps.have_secrets.outputs.ok == 'true' &&
          steps.finalize_check.outputs.ok == 'true'
        id: auto_merge
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9
        with:
          github-token: ${{ steps.auto_merge_token.outputs.token }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const pull_number = context.payload.pull_request.number;
            const expectedSha = context.payload.pull_request.head.sha;
            const sleep = (ms) => new Promise(r => setTimeout(r, ms));

            for (let attempt = 0; attempt < 10; attempt++) {
              const { data: pr } = await github.rest.pulls.get({
                owner,
                repo,
                pull_number
              });

              if (pr.merged) {
                core.info(`PR #${pull_number} is already merged.`);
                core.setOutput('merged', 'true');
                core.setOutput('merge_sha', pr.merge_commit_sha || '');
                return;
              }

              if (pr.head.sha !== expectedSha) {
                core.setFailed(`PR head changed from ${expectedSha} to ${pr.head.sha}; refusing to merge an untested SHA.`);
                return;
              }

              if (pr.draft) {
                core.setFailed(`PR #${pull_number} is a draft; refusing automated security-floor merge.`);
                return;
              }

              if (pr.mergeable === null) {
                await sleep(3000);
                continue;
              }

              if (pr.mergeable === false) {
                core.setFailed(`PR #${pull_number} is not mergeable. mergeable_state=${pr.mergeable_state || 'unknown'}`);
                return;
              }

              const { data: result } = await github.rest.pulls.merge({
                owner,
                repo,
                pull_number,
                sha: expectedSha,
                merge_method: 'squash',
                commit_title: `chore(security): merge security floor PR #${pull_number}`,
                commit_message: 'Automated merge after Local Validation Policy and Cloud E2E passed.'
              });

              core.info(`Merged PR #${pull_number}: ${result.sha || 'unknown sha'}`);
              core.setOutput('merged', 'true');
              core.setOutput('merge_sha', result.sha || '');
              return;
            }

            core.setFailed(`Timed out waiting for PR #${pull_number} mergeability.`);

      - name: Generate App Token for No-Cloud Finalization
        if: |
          steps.app_token_secrets.outputs.available == 'true' &&
          steps.trigger_type.outputs.should_auto_trigger == 'true' &&
          steps.security_release_version.outputs.committed != 'true' &&
          (steps.pr_scope.outputs.mode == 'ci_only' || steps.pr_scope.outputs.mode == 'automation_config_only' || steps.pr_scope.outputs.mode == 'examples_dependency' || steps.pr_scope.outputs.mode == 'toolchain_update') &&
          steps.wait_validation.outputs.ok == 'true'
        id: no_cloud_finalize_token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3
        with:
          app-id: ${{ secrets.E2E_APP_ID }}
          private-key: ${{ secrets.E2E_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: ${{ github.event.repository.name }}
          permission-checks: write

      - name: Finalize stable E2E check for updates that do not require cloud E2E
        if: |
          steps.trigger_type.outputs.should_auto_trigger == 'true' &&
          (steps.pr_scope.outputs.mode == 'ci_only' || steps.pr_scope.outputs.mode == 'automation_config_only' || steps.pr_scope.outputs.mode == 'examples_dependency' || steps.pr_scope.outputs.mode == 'toolchain_update') &&
          steps.wait_validation.outputs.ok == 'true'
        id: finalize_no_cloud
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9
        with:
          github-token: ${{ steps.no_cloud_finalize_token.outputs.token }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const checkRunId = Number('${{ steps.create_run_check.outputs.check_run_id }}') || 0;
            const runId = '${{ steps.run_id.outputs.e2e_run_id }}';
            const mode = '${{ steps.pr_scope.outputs.mode }}';
            let summary = 'Local validation policy succeeded, so cloud E2E was skipped by policy.';
            if (mode === 'ci_only') {
              summary = 'PR touched only CI files and no go.mod/go.sum files. Local validation policy succeeded, so cloud E2E was skipped by policy.';
            } else if (mode === 'automation_config_only') {
              summary = 'PR touched only Renovate configuration. Local validation policy succeeded, so cloud E2E was skipped by policy.';
            } else if (mode === 'examples_dependency') {
              summary = 'Renovate updated only checked-in example module metadata. Local validation includes example smoke tests, so cloud E2E was skipped by policy.';
            } else if (mode === 'toolchain_update') {
              summary = 'Renovate updated only the root go.mod toolchain directive. Local validation ran with that toolchain, and cloud E2E was skipped because this does not affect programs importing slogcp.';
            }

            await github.rest.checks.update({
              owner,
              repo,
              check_run_id: checkRunId,
              status: 'completed',
              conclusion: 'skipped',
              completed_at: new Date().toISOString(),
              output: {
                title: process.env.CHECK_RUN_NAME,
                summary
              }
            });

            core.setOutput('ok', 'true');
        env:
          CHECK_RUN_NAME: ${{ env.CHECK_RUN_NAME }}

      - name: Generate App Token for Blocked Auto-Path Finalization
        if: |
          always() &&
          steps.app_token_secrets.outputs.available == 'true' &&
          steps.trigger_type.outputs.should_auto_trigger == 'true' &&
          steps.security_release_version.outputs.committed != 'true' &&
          (steps.wait_validation.outputs.ok != 'true' ||
           ((steps.pr_scope.outputs.mode == 'security_floor' || steps.pr_scope.outputs.mode == 'renovate_cloud_e2e') && steps.have_secrets.outputs.ok != 'true'))
        id: blocked_finalize_token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3
        with:
          app-id: ${{ secrets.E2E_APP_ID }}
          private-key: ${{ secrets.E2E_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: ${{ github.event.repository.name }}
          permission-checks: write

      - name: Update stable E2E check when auto path cannot run
        if: |
          always() &&
          steps.trigger_type.outputs.should_auto_trigger == 'true' &&
          steps.security_release_version.outputs.committed != 'true' &&
          (steps.wait_validation.outputs.ok != 'true' ||
           ((steps.pr_scope.outputs.mode == 'security_floor' || steps.pr_scope.outputs.mode == 'renovate_cloud_e2e') && steps.have_secrets.outputs.ok != 'true'))
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9
        with:
          github-token: ${{ steps.blocked_finalize_token.outputs.token }}
          script: |
            const validationOk = '${{ steps.wait_validation.outputs.ok }}' === 'true';
            const gcpSecretsOk = '${{ steps.have_secrets.outputs.ok }}' === 'true';
            const mode = '${{ steps.pr_scope.outputs.mode }}';
            let conclusion = ${{ toJSON(steps.wait_validation.outputs.conclusion) }} || 'action_required';
            let summary = ${{ toJSON(steps.wait_validation.outputs.summary) }} || 'Local validation did not complete successfully.';
            if (validationOk && (mode === 'security_floor' || mode === 'renovate_cloud_e2e') && !gcpSecretsOk) {
              conclusion = 'action_required';
              summary = `GCP E2E secrets are unavailable. A maintainer can run the "Manual E2E Test Trigger" workflow with PR #${{ github.event.pull_request.number }} after secrets are configured.`;
            }
            const checkRunId = Number('${{ steps.create_run_check.outputs.check_run_id }}') || 0;
            if (!checkRunId) {
              core.setFailed('No stable E2E check run was created for this auto path.');
              return;
            }

            await github.rest.checks.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              check_run_id: checkRunId,
              status: 'completed',
              conclusion,
              completed_at: new Date().toISOString(),
              output: {
                title: process.env.CHECK_RUN_NAME,
                summary
              }
            });
        env:
          CHECK_RUN_NAME: ${{ env.CHECK_RUN_NAME }}

      - name: Fail workflow when automatic E2E cannot run
        if: |
          always() &&
          steps.trigger_type.outputs.should_auto_trigger == 'true' &&
          steps.security_release_version.outputs.committed != 'true' &&
          (steps.wait_validation.outputs.ok != 'true' ||
           ((steps.pr_scope.outputs.mode == 'security_floor' || steps.pr_scope.outputs.mode == 'renovate_cloud_e2e') && steps.have_secrets.outputs.ok != 'true'))
        run: |
          echo "Automatic E2E gate did not reach a passable terminal state."
          echo "Local validation ok: ${{ steps.wait_validation.outputs.ok }}"
          echo "GCP secrets ok: ${{ steps.have_secrets.outputs.ok }}"
          exit 1
