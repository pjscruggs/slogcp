syntax = "proto3";

package tracegrpc;

option go_package = "github.com/pjscruggs/slogcp-test/services/traceproto;tracepb";

message TraceWorkRequest {
  string test_id = 1;
  string message = 2;
}

message TraceWorkResponse {
  string acknowledgement = 1;
  map<string, string> metadata = 2;
}

message ErrorWorkRequest {
  string test_id = 1;
  string grpc_status = 2;
  string error_message = 3;
}

message PanicWorkRequest {
  string test_id = 1;
  string panic_message = 2;
}

message EchoPayloadRequest {
  string test_id = 1;
  string data = 2;
}

message EchoPayloadResponse {
  string data = 1;
}

message ServerStreamRequest {
  string test_id = 1;
  int32 response_count = 2;
  string response_payload = 3;
  string final_status = 4;
  string final_message = 5;
}

message ServerStreamResponse {
  string test_id = 1;
  int32 sequence = 2;
  string payload = 3;
}

message ClientStreamRequest {
  string test_id = 1;
  string chunk_id = 2;
  string payload = 3;
  string final_status = 4;
  string final_message = 5;
}

message ClientStreamResponse {
  string test_id = 1;
  int32 received_chunks = 2;
  string concatenated = 3;
}

message BidiStreamRequest {
  string test_id = 1;
  string chunk_id = 2;
  string payload = 3;
  bool close_after = 4;
  string final_status = 5;
  string final_message = 6;
}

message BidiStreamResponse {
  string test_id = 1;
  string chunk_id = 2;
  string payload = 3;
}

service TraceWorker {
  rpc DoWork(TraceWorkRequest) returns (TraceWorkResponse);
  rpc FailWork(ErrorWorkRequest) returns (TraceWorkResponse);
  rpc PanicWork(PanicWorkRequest) returns (TraceWorkResponse);
  rpc EchoPayload(EchoPayloadRequest) returns (EchoPayloadResponse);
  rpc StreamServer(ServerStreamRequest) returns (stream ServerStreamResponse);
  rpc StreamClient(stream ClientStreamRequest) returns (ClientStreamResponse);
  rpc StreamBidi(stream BidiStreamRequest) returns (stream BidiStreamResponse);
}
